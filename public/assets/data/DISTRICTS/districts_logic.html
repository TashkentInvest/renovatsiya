        // Initialize the map
        async function initMap() {
            usdRate = await fetchUsdRate();
            const urlParams = new URLSearchParams(window.location.search);
            const urlLat = parseFloat(urlParams.get('lat'));
            const urlLng = parseFloat(urlParams.get('lng'));

            const mapOptions = {
                zoom: (urlLat && urlLng) ? 15 : 12,
                center: {
                    lat: urlLat || 41.311,
                    lng: urlLng || 69.279
                },
                mapTypeId: 'hybrid',

                mapTypeControl: true,
                mapTypeControlOptions: {
                    style: google.maps.MapTypeControlStyle.DROPDOWN_MENU
                },
                streetViewControl: false,
                fullscreenControl: false
            };
            map = new google.maps.Map(document.getElementById('map'), mapOptions);

            // Initialize Bootstrap modal
            const searchModalEl = document.getElementById('searchModal');
            if (searchModalEl && window.bootstrap) {
                searchModalInstance = new bootstrap.Modal(searchModalEl);

                // Set up modal event listeners
                searchModalEl.addEventListener('hidden.bs.modal', function() {
                    // Apply filters when modal is hidden
                    applyFilters('mobile');
                });

            // Get markers
            await fetchMarkers(map, urlLat, urlLng);
            handleDistricts(map);

            setupSearchFunctionality('desktop');

            setupSearchFunctionality('mobile');

                });

            const categorySelector = document.getElementById('category-selector');
            const categorySelectorMobile = document.getElementById('category-selector-mobile');

            if (categorySelector && categorySelectorMobile) {
                categorySelector.addEventListener('change', function() {
                    categorySelectorMobile.value = this.value;
                    filterMarkers(this.value);

                    categorySelector.value = this.value;
                    // Don't apply immediately on mobile - wait for search button or modal close

        // Apply all current filters
        function applyFilters(source) {
            // Reset all markers to visible first
            if (window.mapMarkers) {
                window.mapMarkers.forEach(({
                    marker
                }) => {
                    marker.setVisible(true);
                });
            }

            // Get filter values from the appropriate source
            const sourcePrefix = source === 'mobile' ? '-mobile' : '';

            const districtValue = document.getElementById(`xml-selector${sourcePrefix}`).value;
            const categoryValue = document.getElementById(`category-selector${sourcePrefix}`).value;
            const searchTerm = document.getElementById(`search-input${sourcePrefix}`).value.trim().toLowerCase();

            // Apply district filter
            if (districtValue !== 'tashkent') {
                const districtName = getReadableDistrictName(districtValue);
                filterByRegion(districtName);

                // Highlight district on map
                if (source === 'mobile') {
                    highlightDistrict(districtValue);
                }
            }

            // Apply search term filter
            if (searchTerm) {
                searchMarkers(searchTerm);
            }

            // Apply category filter
            if (categoryValue !== 'all') {
                filterMarkers(categoryValue);
            }

            // Close info sidebar if open
            document.getElementById('info-sidebar').classList.remove('open');
        }

        // Convert district XML filename to readable name
        function getReadableDistrictName(districtValue) {
            // Remove .xml extension if present
            const districtKey = districtValue.replace('.xml', '');
            // Return the district name in current language
            return translations[currentLanguage].district[districtKey] || districtKey;
        }

        function searchMarkers(searchTerm) {
            if (!window.mapMarkers || !searchTerm) return;

            window.mapMarkers.forEach(({
                marker,
                data
            }) => {
                // Create a combined search text from all relevant fields
                const searchFields = [
                    data.property_name || '',
                    data.build_types || '',
                    data.address || '',
                    data.region || '',
                    data.property_category || '',
                    data.lot_number || ''
                ];

                const combinedData = searchFields.join(' ').toLowerCase();
                const isVisible = combinedData.includes(searchTerm);
                marker.setVisible(isVisible ? marker.getVisible() : false); // Only modify if it's already visible
            });
        }

        function filterByRegion(regionName) {
            if (!window.mapMarkers || !regionName) return;

            window.mapMarkers.forEach(({
                marker,
                data
            }) => {
                // Check if the marker's region includes the selected region name
                const region = (data.region || '').toLowerCase();
                const matchesRegion = region.includes(regionName.toLowerCase());
                const currentlyVisible = marker.getVisible();

                // Only hide markers that are currently visible
                if (currentlyVisible && !matchesRegion) {
                    marker.setVisible(true);
                }
            });
        }

        async function fetchUsdRate() {
            try {
                const response = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
                const data = await response.json();
                const usdObj = data.find(item => item.Ccy === 'USD');
                if (usdObj && usdObj.Rate) {
                    return parseFloat(usdObj.Rate);
                }
            } catch (e) {
                console.error('USD rate fetch error', e);
            }
            return null;
        }

        // Fetch markers from the server
        async function fetchMarkers(map, urlLat, urlLng) {
            try {
                const response = await fetch('/api/markersing');
                const data = await response.json();
                const markersData = data.lots || [];
                window.markers = markersData;
                window.mapMarkers = [];

                let targetMarkerData = null;
                const categoryCounts = {
                    'all': 0,
                    'ishlab-chiqarish': 0,
                    'savdo-maishiy': 0,
                    'kop-qavatli-uylar': 0,
                    'ijtimoiy-soha': 0,
                    'transport-infratuzilmasi': 0,
                    'others': 0
                };

                markersData.forEach(markerData => {
                    if (markerData.property_group !== 'Yer uchastkalari') return;
                    const lat = parseFloat(markerData.lat);
                    const lng = parseFloat(markerData.lng);
                    if (isNaN(lat) || isNaN(lng)) return;

                    const marker = new google.maps.Marker({
                        position: {
                            lat,
                            lng
                        },
                        map,
                        title: markerData.property_name || 'No Title'
                    });
                    marker.setVisible(true);

                    let assignedCategory = 'others';
                    const buildTypes = (markerData.build_types || '').toLowerCase();
                    for (const [cat, keywords] of Object.entries(categoryKeywords)) {
                        if (keywords.some(kw => buildTypes.includes(kw.toLowerCase()))) {
                            assignedCategory = cat;
                            break;
                        }
                    }
                    markerData.category = assignedCategory;
                    categoryCounts.all++;
                    categoryCounts[assignedCategory]++;

                    marker.addListener('click', () => {
                        const sidebar = document.getElementById('info-sidebar');
                        currentOpenLot = markerData;
                        currentLotCurrency = sidebar.getAttribute('data-currency');
                        updateSidebarContent(markerData, currentLotCurrency === 'USD');
                        sidebar.classList.add('open');
                    });

                    window.mapMarkers.push({
                        marker,
                        data: markerData
                    });

                    if (urlLat && urlLng) {
                        // Check if the lat/lng matches any marker
                        const latDiff = Math.abs(lat - urlLat);
                        const lngDiff = Math.abs(lng - urlLng);
                        if (latDiff < 0.0001 && lngDiff < 0.0001) {
                            targetMarkerData = markerData;
                            map.setCenter({
                                lat,
                                lng
                            });
                            map.setZoom(15);
                        }
                    }
                });

                // If a specific marker was matched from URL
                const sidebar = document.getElementById('info-sidebar');
                if (targetMarkerData) {
                    currentOpenLot = targetMarkerData;
                    currentLotCurrency = sidebar.getAttribute('data-currency');
                    updateSidebarContent(targetMarkerData, currentLotCurrency === 'USD');
                    sidebar.classList.add('open');
                } else if (urlLat && urlLng) {
                    // Show an error if URL lat/lng doesn't match any marker
                    const t = translations[currentLanguage].infoSidebar;
                    sidebar.innerHTML = `
              <span class="close-btn">&times;</span>
              <div class="info-content">
                <h4 class="custom_sidebar_title"><b>${t.notFound}</b></h4>
              </div>`;
                    sidebar.classList.add('open');
                }

                setupSidebarAndInteraction();
                updateCategorySelectorCounts(categoryCounts);
            } catch (err) {
                console.error('Error fetching marker data:', err);
            }
        }

        function filterMarkers(selectedCategory) {
            if (!window.mapMarkers) return;

            window.mapMarkers.forEach(({
                marker,
                data
            }) => {
                if (selectedCategory === 'all') {
                    // Don't modify visibility if 'all' is selected
                    return;
                } else {
                    const matchesCategory = (data.category || 'others') === selectedCategory;
                    const currentlyVisible = marker.getVisible();

                    // Only hide markers that are currently visible
                    if (currentlyVisible && !matchesCategory) {
                        marker.setVisible(false);
                    }
                }
            });
        }

        function handleDistricts(map) {
            const defaultColor = '#c7a5a594';
            const highlightColor = '#EEF5FF';
            const kmlFiles = [
                'bektemir.xml', 'chilonzor.xml', 'mirabod.xml', 'mirzo_ulugbek.xml', 'olmazor.xml',
                'sergeli.xml', 'shayhontaxur.xml', 'uchtepa.xml', 'yakkasaroy.xml', 'yashnabod.xml',
                'yunusabod.xml', 'yangihayot.xml'
            ];

            Promise.all(kmlFiles.map(file => fetchKML(file)))
                .then(kmlDataList => {
                    kmlDataList.forEach((kmlPaths, idx) => {
                        addPolygon(kmlFiles[idx], [kmlPaths], defaultColor, map);
                    });
                })
                .catch(err => console.error('Error loading KML files:', err));

            async function fetchKML(fileName) {
                const res = await fetch(`https://projects.toshkentinvest.uz/xml-map/${fileName}`);
                const text = await res.text();
                return parseKML(text);
            }

            function parseKML(kmlText) {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(kmlText, "application/xml");
                const coordsText = xmlDoc.querySelector('coordinates')?.textContent.trim() || '';
                return coordsText.split(' ').map(coordStr => {
                    const [lng, lat] = coordStr.split(',').map(Number);
                    return {
                        lat,
                        lng
                    };
                });
            }

            function addPolygon(fileName, paths, fillColor, map) {
                if (polygons[fileName]) {
                    polygons[fileName].forEach(poly => poly.setMap(null));
                }
                polygons[fileName] = paths.map(path => new google.maps.Polygon({
                    paths: path,
                    strokeColor: '#fff',
                    strokeOpacity: 0.8,
                    strokeWeight: 2,
                    fillColor,
                    fillOpacity: 0.35,
                    map
                }));
            }
        }

        function setPolygonColor(fileName, color, polygonsObj) {
            if (polygonsObj[fileName]) {
                polygonsObj[fileName].forEach(poly => poly.setOptions({
                    fillColor: color
                }));
            }
        }

        async function fetchDistrictInfo(districtFile) {
            const districtInfoUrl = "https://projects.toshkentinvest.uz/districtInfo.json";
            try {
                const res = await fetch(districtInfoUrl);
                const jsonData = await res.json();
                const info = jsonData[districtFile] || {
                    name: 'N/A',
                    maydoni: 'N/A',
                    aholiSoni: 'N/A',
                    TumanlarSoni: 'N/A',
                    MahallaSoni: 'N/A',
                    savdodaTurganJamiSoni: 'N/A'
                };

                document.getElementById('district-name').textContent = info.name || 'N/A';
                document.getElementById('maydoni').textContent = info.maydoni || 'N/A';
                document.getElementById('aholiSoni').textContent = info.aholiSoni || 'N/A';
                document.getElementById('TumanlarSoni').textContent = info.TumanlarSoni || 'N/A';
                document.getElementById('MahallaSoni').textContent = info.MahallaSoni || 'N/A';
                document.getElementById('savdodaTurganJamiSoni').textContent = info.savdodaTurganJamiSoni || 'N/A';

                // Cache the district info for language switching
                if (info.name) {
                    districtInfoCache[info.name] = info;
                }

                // Update labels to match the current language
                updateDistrictInfoLabels();
            } catch (err) {
                console.error('Error fetching district info:', err);
            }
        }
    </script>
</body>
